# Container image configuration
quarkus.container-image.build=true
quarkus.container-image.name=rimfrost-service-handlaggning
quarkus.container-image.tag=latest
quarkus.container-image.group=rimfrost
quarkus.container-image.push=false

#Deserializer
mp.messaging.incoming.vah-handlaggning-responses.value.deserializer=se.fk.github.rimfrost.handlaggning.presentation.kafka.VahHandlaggningResponseMessagePayloadDeserializer

#Serializer
mp.messaging.outgoing.vah-handlaggning-requests.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.handlaggning-done.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

#Incoming
mp.messaging.incoming.vah-handlaggning-responses.connector=smallrye-kafka
mp.messaging.incoming.vah-handlaggning-responses.topic=vah-handlaggning-responses
mp.messaging.incoming.vah-handlaggning-responses.auto.offset.reset=earliest

#Outgoing
mp.messaging.outgoing.vah-handlaggning-requests.connector=smallrye-kafka
mp.messaging.outgoing.vah-handlaggning-requests.topic=vah-handlaggning-requests
mp.messaging.outgoing.handlaggning-done.connector=smallrye-kafka
mp.messaging.outgoing.handlaggning-done.topic=handlaggning-done

%dev.quarkus.kafka.devservices.enabled=true
